name: Validate registry PR

on:
  pull_request:
    paths:
      - "index.json"
      - "schema/index.schema.json"
      - ".github/workflows/validate-pr.yml"
  push:
    branches: [main]
    paths:
      - "index.json"
      - "schema/index.schema.json"

permissions:
  contents: read

jobs:
  validate:
    name: Schema + pinned asset + SHA-256
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ajv-cli
        run: npm install -g ajv-cli@^5 ajv-formats@^3

      - name: Validate index.json against schema
        run: |
          ajv validate \
            -s schema/index.schema.json \
            -d index.json \
            --spec=draft7 \
            -c ajv-formats \
            --strict=false

      - name: Check for duplicate mod ids
        run: |
          node -e "
            const reg = require('./index.json');
            const ids = reg.mods.map(m => m.id);
            const dups = ids.filter((id, i) => ids.indexOf(id) !== i);
            if (dups.length) {
              console.error('Duplicate mod ids:', dups.join(', '));
              process.exit(1);
            }
            console.log('No duplicate ids.');
          "

      - name: Verify each mod's pinned release + SHA-256
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          fail=0
          mods_json=$(node -e "console.log(JSON.stringify(require('./index.json').mods))")
          echo "$mods_json" | node -e '
            const mods = JSON.parse(require("fs").readFileSync(0, "utf8"));
            for (const m of mods) console.log(`${m.id}\t${m.repo}\t${m.version}\t${m.assetName}\t${m.sha256}`);
          ' | while IFS=$'\t' read -r id repo version assetName sha256; do
              echo ""
              echo "Checking $id ($repo) pinned to v$version..."

              # Repo must exist + be public.
              if ! gh api "repos/$repo" >/dev/null 2>&1; then
                echo "  FAIL: repos/$repo not found (typo'd name? still private?)."
                fail=1
                continue
              fi

              # Pinned tag must exist as a published release.
              if ! release=$(gh api "repos/$repo/releases/tags/v$version" 2>/dev/null); then
                echo "  FAIL: repos/$repo has no release at tag v$version. Publish that tag before merging this PR."
                fail=1
                continue
              fi

              # Pinned asset must exist on that release.
              asset_url=$(echo "$release" | node -e "
                const r = JSON.parse(require('fs').readFileSync(0, 'utf8'));
                const want = process.argv[1];
                const a = r.assets.find(a => a.name === want);
                console.log(a ? a.browser_download_url : '');
              " "$assetName")
              if [ -z "$asset_url" ]; then
                echo "  FAIL: release v$version has no asset named '$assetName'."
                fail=1
                continue
              fi

              # SHA-256 must match the bytes on disk.
              tmpfile=$(mktemp)
              if ! curl -sLf -o "$tmpfile" "$asset_url"; then
                echo "  FAIL: could not download $asset_url for hashing."
                rm -f "$tmpfile"
                fail=1
                continue
              fi
              actual=$(sha256sum "$tmpfile" | awk '{print $1}')
              rm -f "$tmpfile"
              if [ "$actual" != "$sha256" ]; then
                echo "  FAIL: sha256 mismatch."
                echo "    registry: $sha256"
                echo "    actual:   $actual"
                fail=1
                continue
              fi

              echo "  OK"
            done
            if [ "$fail" -ne 0 ]; then
              echo ""
              echo "One or more entries failed pinned-release checks. See output above."
              exit 1
            fi
